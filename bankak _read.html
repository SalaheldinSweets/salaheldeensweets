<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 محفظة بنكك - Bankak Wallet</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }

        /* Balance Card */
        .balance-card {
            background: linear-gradient(135deg, #e31c25, #c4121a);
            border-radius: 20px;
            padding: 30px;
            color: white;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(227, 28, 37, 0.3);
            position: relative;
            overflow: hidden;
        }
        .balance-card::before {
            content: "";
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
        }
        .balance-label {
            font-size: 1rem;
            opacity: 0.9;
            margin-bottom: 10px;
        }
        .balance-amount {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .balance-currency {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        /* Stats */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }
        .stat-card.income { border-top: 4px solid #28a745; }
        .stat-card.expense { border-top: 4px solid #dc3545; }
        .stat-label { color: #888; font-size: 0.9rem; margin-bottom: 8px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; }
        .stat-card.income .stat-value { color: #28a745; }
        .stat-card.expense .stat-value { color: #dc3545; }

        /* Input Card */
        .input-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .section-title {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e31c25;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .paste-area {
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            background: #fafafa;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .paste-area:hover, .paste-area.active {
            border-color: #e31c25;
            background: #fff5f5;
        }
        .paste-area .icon { font-size: 40px; margin-bottom: 10px; }
        .paste-area p { color: #888; font-size: 0.9rem; }
        .paste-area .hint { font-size: 0.8rem; color: #aaa; margin-top: 5px; }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            resize: vertical;
            min-height: 120px;
            font-family: inherit;
            direction: rtl;
        }
        textarea:focus { outline: none; border-color: #e31c25; }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn-primary {
            background: linear-gradient(135deg, #e31c25, #c4121a);
            color: white;
            width: 100%;
            justify-content: center;
            margin-top: 10px;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(227, 28, 37, 0.4); }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
            padding: 8px 20px;
            font-size: 13px;
        }
        .btn-secondary:hover { background: #e0e0e0; }

        /* Legend */
        .legend {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            font-size: 0.85rem;
            justify-content: center;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-dot.red { background: #dc3545; }
        .legend-dot.blue { background: #007bff; }
        .legend-dot.green { background: #28a745; }

        /* Transaction Cards */
        .transactions-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }
        .transactions-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .transactions-count {
            background: #e31c25;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .transaction-item {
            border-radius: 15px;
            padding: 18px;
            margin-bottom: 12px;
            position: relative;
            transition: all 0.3s;
            border-right: 5px solid;
        }
        .transaction-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        /* Category: Store (m) - Red */
        .transaction-item.store {
            background: linear-gradient(135deg, #fff5f5, #ffe0e0);
            border-right-color: #dc3545;
        }
        .transaction-item.store .category-badge {
            background: #dc3545;
            color: white;
        }

        /* Category: Home (s) - Blue */
        .transaction-item.home {
            background: linear-gradient(135deg, #f0f8ff, #e0f0ff);
            border-right-color: #007bff;
        }
        .transaction-item.home .category-badge {
            background: #007bff;
            color: white;
        }

        /* Category: Income - Green */
        .transaction-item.income {
            background: linear-gradient(135deg, #f0fff4, #e0ffe0);
            border-right-color: #28a745;
        }
        .transaction-item.income .category-badge {
            background: #28a745;
            color: white;
        }

        .transaction-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .transaction-amount {
            font-size: 1.4rem;
            font-weight: bold;
        }
        .transaction-item.store .transaction-amount { color: #dc3545; }
        .transaction-item.home .transaction-amount { color: #007bff; }
        .transaction-item.income .transaction-amount { color: #28a745; }

        .category-badge {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .transaction-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            font-size: 0.85rem;
            color: #666;
        }
        .transaction-details .detail {
            display: flex;
            flex-direction: column;
        }
        .transaction-details .detail-label {
            font-size: 0.75rem;
            color: #999;
            margin-bottom: 2px;
        }
        .transaction-details .detail-value {
            font-weight: 600;
            color: #333;
        }
        .transaction-comment {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed rgba(0,0,0,0.1);
            font-size: 0.85rem;
            color: #555;
            font-style: italic;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
        .empty-state .icon { font-size: 50px; margin-bottom: 15px; }

        .delete-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s;
        }
        .transaction-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: #dc3545; color: white; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #333;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            font-size: 0.95rem;
            opacity: 0;
            transition: all 0.3s;
            z-index: 1000;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
        }
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast.success { background: #28a745; }
        .toast.error { background: #dc3545; }

        .footer {
            text-align: center;
            color: #aaa;
            margin-top: 30px;
            font-size: 0.85rem;
            padding-bottom: 20px;
        }

        @media (max-width: 480px) {
            .balance-amount { font-size: 2.2rem; }
            .transaction-details { grid-template-columns: 1fr; }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-label">💳 الرصيد الحالي</div>
            <div class="balance-amount" id="balanceAmount">0.00</div>
            <div class="balance-currency">ج.س</div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card income">
                <div class="stat-label">📥 الإيرادات</div>
                <div class="stat-value" id="totalIncome">0.00</div>
            </div>
            <div class="stat-card expense">
                <div class="stat-label">📤 المصروفات</div>
                <div class="stat-value" id="totalExpense">0.00</div>
            </div>
        </div>

        <!-- Input Card -->
        <div class="input-card">
            <div class="section-title">📋 إضافة عملية جديدة</div>

            <div class="paste-area" id="pasteArea" onclick="document.getElementById('manualText').focus()">
                <div class="icon">📋</div>
                <p>اضغط هنا ثم اضغط <strong>Ctrl+V</strong> للصق النص</p>
                <p class="hint">أو اكتب/الصق النص في المربع أدناه</p>
            </div>

            <textarea id="manualText" placeholder="الصق نص الإشعار هنا...

مثال:
رقم العملية: 20898171876
التاريخ والوقت: 30-May-2026 16:35:16
نوع العملية: تحويل إلى حساب آخر
المبلغ: 32000.00
من: 0033 0453 3207 0001
إلى: 0033 0523 7424 0001
الحالة: نجاح
اسم المرسل إليه: امجد صلاح الدين محمد صالح
التعليق: تحويلة نهائية امجد m"></textarea>

            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot red"></div>
                    <span>محل (m)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot blue"></div>
                    <span>منزل (s)</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot green"></div>
                    <span>إيراد</span>
                </div>
            </div>

            <button class="btn btn-primary" onclick="processTransaction()">
                ➕ إضافة العملية
            </button>

            <div style="text-align: center; margin-top: 15px;">
                <button class="btn btn-secondary" onclick="clearAll()">🗑️ مسح الكل</button>
                <button class="btn btn-secondary" onclick="exportData()">📥 تصدير</button>
            </div>
        </div>

        <!-- Transactions -->
        <div class="transactions-card">
            <div class="transactions-header">
                <div class="section-title" style="margin:0; border:none;">📜 سجل العمليات</div>
                <div class="transactions-count" id="transactionsCount">0</div>
            </div>
            <div id="transactionsList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <p>لا توجد عمليات مسجلة</p>
                    <p style="font-size: 0.8rem; margin-top: 5px;">أضف عملية جديدة لبدء التتبع</p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <p>💰 محفظة بنكك © 2026 | يعمل بدون إنترنت</p>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Your account number (change this to your actual number)
        const MY_ACCOUNT = "0033045332070001";

        // Load data from localStorage
        let transactions = JSON.parse(localStorage.getItem('bankak_transactions') || '[]');
        let balance = parseFloat(localStorage.getItem('bankak_balance') || '0');

        // Initialize
        updateUI();

        // Paste handling
        document.addEventListener('paste', function(e) {
            const pasteArea = document.getElementById('pasteArea');
            pasteArea.classList.add('active');
            setTimeout(() => pasteArea.classList.remove('active'), 300);

            const text = e.clipboardData.getData('text');
            if (text && text.length > 10) {
                document.getElementById('manualText').value = text;
                showToast('✅ تم اللصق! اضغط إضافة العملية', 'success');
            }
        });

        function processTransaction() {
            const text = document.getElementById('manualText').value.trim();
            if (!text) {
                showToast('❌ الرجاء إدخال نص الإشعار', 'error');
                return;
            }

            const data = extractData(text);
            if (!data.amount) {
                showToast('❌ لم يتم العثور على المبلغ', 'error');
                return;
            }

            // Determine if income or expense
            const fromAccount = (data.from || '').replace(/\s/g, '');
            const isIncome = fromAccount !== MY_ACCOUNT.replace(/\s/g, '');

            // Determine category from comment
            let category = 'income';
            let categoryLabel = 'إيراد';

            if (!isIncome) {
                const comment = (data.comment || '').toLowerCase();
                if (comment.includes('m')) {
                    category = 'store';
                    categoryLabel = 'محل 🏪';
                } else if (comment.includes('s')) {
                    category = 'home';
                    categoryLabel = 'منزل 🏠';
                } else {
                    category = 'store'; // default expense
                    categoryLabel = 'مصروفات 📤';
                }
            } else {
                categoryLabel = 'إيراد 📥';
            }

            const amount = parseFloat(data.amount.replace(/,/g, ''));

            // Update balance
            if (isIncome) {
                balance += amount;
            } else {
                balance -= amount;
            }

            const transaction = {
                id: Date.now(),
                transactionId: data.transactionId || '-',
                dateTime: data.dateTime || new Date().toLocaleString('ar-SD'),
                type: data.type || '-',
                amount: amount,
                from: data.from || '-',
                to: data.to || '-',
                status: data.status || '-',
                recipient: data.recipient || '-',
                comment: data.comment || '-',
                category: category,
                categoryLabel: categoryLabel,
                isIncome: isIncome,
                timestamp: Date.now()
            };

            transactions.unshift(transaction);
            saveData();
            updateUI();

            document.getElementById('manualText').value = '';
            showToast(isIncome ? '✅ تم إضافة الإيراد!' : '✅ تم إضافة المصروف!', 'success');
        }

        function extractData(text) {
            const data = {};
            const clean = text.replace(/[ً-ٰٟـ]/g, '')
                .replace(/أ|إ|آ/g, 'ا').replace(/ة/g, 'ه').replace(/ى/g, 'ي');

            // Amount
            const amountMatch = clean.match(/المبلغ[:\s]*([\d,\.]+)/);
            if (amountMatch) data.amount = amountMatch[1];

            // Transaction ID
            const idMatch = clean.match(/رقم\s*العملية[:\s]*([\d\s]+)/);
            if (idMatch) data.transactionId = idMatch[1].replace(/\s/g, '').trim();

            // Date
            const dateMatch = clean.match(/التاريخ(?:\s*والوقت)?[:\s]*([\w\-:\s/]+)/);
            if (dateMatch) data.dateTime = dateMatch[1].trim();

            // Type
            const typeMatch = clean.match(/نوع\s*العملية[:\s]*(.+)/);
            if (typeMatch) data.type = typeMatch[1].trim();

            // From
            const fromMatch = clean.match(/من[:\s]*([\d\s]+)/);
            if (fromMatch) data.from = fromMatch[1].trim();

            // To
            const toMatch = clean.match(/إلى[:\s]*([\d\s]+)/);
            if (toMatch) data.to = toMatch[1].trim();

            // Status
            const statusMatch = clean.match(/الحالة[:\s]*(.+)/);
            if (statusMatch) data.status = statusMatch[1].trim();

            // Recipient
            const recipientMatch = clean.match(/اسم\s*المرسل\s*إليه[:\s]*(.+)/);
            if (recipientMatch) data.recipient = recipientMatch[1].trim();

            // Comment
            const commentMatch = clean.match(/التعليق[:\s]*(.+)/);
            if (commentMatch) data.comment = commentMatch[1].trim();

            return data;
        }

        function updateUI() {
            // Balance
            document.getElementById('balanceAmount').textContent = balance.toFixed(2);
            document.getElementById('balanceAmount').style.color = balance >= 0 ? '#fff' : '#ffcccb';

            // Stats
            let income = 0, expense = 0;
            transactions.forEach(t => {
                if (t.isIncome) income += t.amount;
                else expense += t.amount;
            });
            document.getElementById('totalIncome').textContent = income.toFixed(2);
            document.getElementById('totalExpense').textContent = expense.toFixed(2);

            // Transactions count
            document.getElementById('transactionsCount').textContent = transactions.length;

            // Transactions list
            const list = document.getElementById('transactionsList');
            if (transactions.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <p>لا توجد عمليات مسجلة</p>
                        <p style="font-size: 0.8rem; margin-top: 5px;">أضف عملية جديدة لبدء التتبع</p>
                    </div>`;
                return;
            }

            list.innerHTML = transactions.map(t => `
                <div class="transaction-item ${t.category}">
                    <button class="delete-btn" onclick="deleteTransaction(${t.id})">×</button>
                    <div class="transaction-header">
                        <div>
                            <div class="transaction-amount">
                                ${t.isIncome ? '+' : '-'} ${t.amount.toFixed(2)} ج.س
                            </div>
                            <div style="font-size: 0.8rem; color: #888; margin-top: 4px;">
                                ${t.type}
                            </div>
                        </div>
                        <span class="category-badge">${t.categoryLabel}</span>
                    </div>
                    <div class="transaction-details">
                        <div class="detail">
                            <span class="detail-label">📅 التاريخ</span>
                            <span class="detail-value">${t.dateTime}</span>
                        </div>
                        <div class="detail">
                            <span class="detail-label">🔢 رقم العملية</span>
                            <span class="detail-value">${t.transactionId}</span>
                        </div>
                        <div class="detail">
                            <span class="detail-label">⬅️ من</span>
                            <span class="detail-value">${t.from}</span>
                        </div>
                        <div class="detail">
                            <span class="detail-label">➡️ إلى</span>
                            <span class="detail-value">${t.to}</span>
                        </div>
                    </div>
                    ${t.comment !== '-' ? `<div class="transaction-comment">💬 ${t.comment}</div>` : ''}
                </div>
            `).join('');
        }

        function deleteTransaction(id) {
            const t = transactions.find(x => x.id === id);
            if (t) {
                if (t.isIncome) balance -= t.amount;
                else balance += t.amount;
            }
            transactions = transactions.filter(x => x.id !== id);
            saveData();
            updateUI();
            showToast('🗑️ تم الحذف', 'success');
        }

        function clearAll() {
            if (!confirm('هل أنت متأكد من مسح جميع العمليات؟')) return;
            transactions = [];
            balance = 0;
            saveData();
            updateUI();
            showToast('🗑️ تم مسح الكل', 'success');
        }

        function exportData() {
            const csv = [
                ['التاريخ', 'النوع', 'المبلغ', 'الفئة', 'من', 'إلى', 'التعليق', 'رقم العملية'].join(','),
                ...transactions.map(t => [
                    t.dateTime, t.type, t.amount, t.categoryLabel, t.from, t.to, t.comment, t.transactionId
                ].join(','))
            ].join('
');

            const blob = new Blob([﻿ + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'bankak_transactions.csv';
            link.click();
            showToast('📥 تم التصدير!', 'success');
        }

        function saveData() {
            localStorage.setItem('bankak_transactions', JSON.stringify(transactions));
            localStorage.setItem('bankak_balance', balance.toString());
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
