<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚙️ التحكم - مدير حسابات صلاح الدين</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{font-family:'Cairo',sans-serif;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh}
.app-container{max-width:480px;margin:0 auto;background:#f8fafc;min-height:100vh;box-shadow:0 0 50px rgba(0,0,0,0.2)}
.btn-press:active{transform:scale(0.95);transition:transform 0.1s}
.hide-scrollbar::-webkit-scrollbar{display:none}
.hide-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
.fade-in{animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);align-items:flex-end;z-index:50}
.modal.active{display:flex}
.modal-content{background:white;border-radius:1.5rem 1.5rem 0 0;width:100%;max-width:480px;margin:0 auto;padding:1.5rem;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform 0.3s ease}
.modal.active .modal-content{transform:translateY(0)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-150px);padding:14px 24px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,0.2);z-index:100;transition:transform 0.3s ease;font-weight:600;text-align:center;min-width:280px;font-size:0.9rem}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast-success{background:#10b981;color:white}
.toast-error{background:#ef4444;color:white}
.toast-info{background:#3b82f6;color:white}
.price-card{background:white;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);border:1px solid #e2e8f0;transition:all 0.2s}
.price-card:active{transform:scale(0.99)}
.price-input{width:100%;text-align:center;border:2px solid #e2e8f0;border-radius:10px;padding:10px;font-weight:700;font-size:1.1rem;transition:all 0.2s}
.price-input:focus{border-color:#667eea;outline:none;box-shadow:0 0 0 3px rgba(102,126,234,0.1)}
.unit-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:0.75rem;font-weight:700}
.tab-btn{padding:8px 16px;border-radius:12px;font-size:0.85rem;font-weight:700;transition:all 0.2s;border:2px solid transparent;white-space:nowrap;cursor:pointer}
.tab-btn.active{background:#1e293b;color:white}
.tab-btn:not(.active){background:#f1f5f9;color:#64748b}
.category-header{background:linear-gradient(135deg,#1e293b,#334155);color:white;border-radius:12px;padding:10px 16px;font-weight:700;font-size:0.95rem;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.save-btn{background:linear-gradient(135deg,#10b981,#059669);color:white;border-radius:14px;padding:14px;font-weight:800;font-size:1.1rem;box-shadow:0 4px 15px rgba(16,185,129,0.3);transition:all 0.2s;border:none;width:100%;cursor:pointer}
.save-btn:active{transform:scale(0.97)}
.reset-btn{background:#f1f5f9;color:#64748b;border-radius:10px;padding:8px 16px;font-weight:600;font-size:0.85rem;transition:all 0.2s;border:none;cursor:pointer}
.reset-btn:hover{background:#e2e8f0}
</style>
<base target="_blank">
<base target="_blank">
</head>
<body>
<div id="toast" class="toast toast-success">تمت العملية بنجاح</div>
<div class="app-container" id="app">
<header class="bg-gradient-to-r from-slate-800 to-slate-900 text-white p-4 shadow-lg sticky top-0 z-30">
<div class="flex justify-between items-center">
<button onclick="toggleSidebar()" class="btn-press p-2 rounded-lg hover:bg-slate-700 transition"><span class="text-2xl">☰</span></button>
<h1 class="text-lg font-bold">⚙️ التحكم</h1>
<button onclick="logout()" class="p-2 rounded-lg hover:bg-slate-700 transition text-sm">خروج</button>
</div>
</header>
<div id="sidebar" class="fixed inset-0 bg-black/50 hidden z-50" onclick="toggleSidebar()">
<div class="absolute right-0 top-0 h-full w-72 bg-white shadow-2xl transform transition-transform translate-x-full" id="sidebarContent" onclick="event.stopPropagation()">
<div class="p-4 bg-gradient-to-r from-slate-800 to-slate-900 text-white">
<div class="flex justify-between items-center">
<h2 class="font-bold text-lg">القائمة</h2>
<button onclick="toggleSidebar()" class="text-2xl">&times;</button>
</div>
</div>
<div class="p-4 space-y-2">
<a href="index.html" class="w-full text-right p-3 rounded-xl hover:bg-emerald-50 text-emerald-700 flex items-center gap-3"><span>🏠</span><span>الرئيسية</span></a>
<a href="debts.html" class="w-full text-right p-3 rounded-xl hover:bg-amber-50 flex items-center gap-3 text-amber-700"><span>📝</span><span>الديون</span></a>
<a href="external.html" class="w-full text-right p-3 rounded-xl hover:bg-orange-50 flex items-center gap-3 text-orange-700"><span>🏦</span><span>الصندوق الجانبي</span></a>
<a href="reports.html" class="w-full text-right p-3 rounded-xl hover:bg-blue-50 flex items-center gap-3 text-blue-700"><span>📊</span><span>التقارير</span></a>
<a href="inventory.html" class="w-full text-right p-3 rounded-xl hover:bg-emerald-50 flex items-center gap-3 text-emerald-700"><span>📦</span><span>إدارة المواد</span></a>
<a href="invoices.html" class="w-full text-right p-3 rounded-xl hover:bg-blue-50 flex items-center gap-3 text-blue-700"><span>📄</span><span>فواتير المبيعات</span></a>
<a href="records.html" class="w-full text-right p-3 rounded-xl hover:bg-amber-50 flex items-center gap-3 text-amber-700"><span>📚</span><span>السجلات</span></a>
<a href="shift.html" class="w-full text-right p-3 rounded-xl hover:bg-purple-50 flex items-center gap-3 text-purple-700"><span>🧮</span><span>تصفية الوردية</span></a>
<a href="control.html" class="w-full text-right p-3 rounded-xl bg-purple-50 text-purple-700 font-semibold flex items-center gap-3"><span>⚙️</span><span>التحكم</span></a>
</div>
</div>
</div>

<main class="p-4 space-y-4 pb-28" id="mainContent">

<!-- إحصائيات سريعة -->
<div class="bg-white rounded-2xl p-4 shadow-sm">
<div class="flex justify-between items-center mb-3">
<h3 class="font-bold text-slate-700">📊 إحصائيات الأسعار</h3>
<button onclick="resetAllPrices()" class="reset-btn">🔄 إعادة ضبط</button>
</div>
<div class="grid grid-cols-2 gap-3">
<div class="bg-purple-50 rounded-xl p-3 text-center border border-purple-100">
<div class="text-2xl font-bold text-purple-600" id="totalProducts">0</div>
<div class="text-xs text-purple-500 font-semibold">عدد المنتجات</div>
</div>
<div class="bg-blue-50 rounded-xl p-3 text-center border border-blue-100">
<div class="text-2xl font-bold text-blue-600" id="avgPrice">0</div>
<div class="text-xs text-blue-500 font-semibold">متوسط السعر</div>
</div>
</div>
</div>

<!-- فلترة المنتجات -->
<div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
<button onclick="filterCategory('all')" class="tab-btn active" data-cat="all">الكل</button>
<button onclick="filterCategory('bakery')" class="tab-btn" data-cat="bakery">🥐 خبيز</button>
<button onclick="filterCategory('biscuit')" class="tab-btn" data-cat="biscuit">🍪 بسكويت</button>
<button onclick="filterCategory('dessert')" class="tab-btn" data-cat="dessert">🍰 حلويات</button>
</div>

<!-- المنتجات -->
<div id="productsContainer">
<!-- يتم تعبئتها ديناميكياً -->
</div>

<!-- زر الحفظ -->
<div class="sticky bottom-4 z-40">
<button onclick="saveAllPrices()" class="save-btn btn-press">
💾 حفظ جميع الأسعار
</button>
</div>

</main>

<nav class="bg-white border-t border-slate-200 p-2 sticky bottom-0 z-30">
<div class="flex justify-around items-center">
<a href="index.html" class="flex flex-col items-center p-2 text-slate-400"><span class="text-xl">🏠</span><span class="text-xs mt-1">الرئيسية</span></a>
<a href="invoices.html" class="flex flex-col items-center p-2 text-slate-400"><span class="text-xl">📄</span><span class="text-xs mt-1">الفواتير</span></a>
<a href="control.html" class="flex flex-col items-center p-2 text-purple-600"><span class="text-xl">⚙️</span><span class="text-xs mt-1 font-semibold">التحكم</span></a>
<a href="reports.html" class="flex flex-col items-center p-2 text-slate-400"><span class="text-xl">📊</span><span class="text-xs mt-1">التقارير</span></a>
<a href="shift.html" class="flex flex-col items-center p-2 text-slate-400"><span class="text-xl">🧮</span><span class="text-xs mt-1">الوردية</span></a>
</div>
</nav>
</div>

<script>
// ========== البيانات ==========
const DEFAULT_PRODUCTS = [
    // خبيز
    { id: 'khbiz_1', name: 'بسبوسة', category: 'bakery', unit: 'كجم', defaultPrice: 150, icon: '🥮' },
    { id: 'khbiz_2', name: 'كنافة', category: 'bakery', unit: 'كجم', defaultPrice: 200, icon: '🥐' },
    { id: 'khbiz_3', name: 'صباعات', category: 'bakery', unit: 'كجم', defaultPrice: 120, icon: '🥖' },
    { id: 'khbiz_4', name: 'معجنات', category: 'bakery', unit: 'كجم', defaultPrice: 100, icon: '🥨' },
    { id: 'khbiz_5', name: 'بلح شام', category: 'bakery', unit: 'كجم', defaultPrice: 110, icon: '🍩' },

    // بسكويت
    { id: 'biscuit_1', name: 'بسكويت يانسون', category: 'biscuit', unit: 'صحن', defaultPrice: 350, icon: '🍪' },
    { id: 'biscuit_2', name: 'كونكا كاكاو', category: 'biscuit', unit: 'كجم', defaultPrice: 180, icon: '🍫' },
    { id: 'biscuit_3', name: 'كونكا قوية', category: 'biscuit', unit: 'كجم', defaultPrice: 160, icon: '🍪' },
    { id: 'biscuit_4', name: 'تستيف', category: 'biscuit', unit: 'كجم', defaultPrice: 140, icon: '🥠' },
    { id: 'biscuit_5', name: 'سمسمية', category: 'biscuit', unit: 'كجم', defaultPrice: 130, icon: '🥜' },

    // حلويات
    { id: 'dessert_1', name: 'حصانة باسطة', category: 'dessert', unit: 'صحن', defaultPrice: 450, icon: '🍰' },
    { id: 'dessert_2', name: 'بسبوسة خاصة', category: 'dessert', unit: 'صحن', defaultPrice: 400, icon: '🧁' },
    { id: 'dessert_3', name: 'كنافة ناعمة', category: 'dessert', unit: 'صحن', defaultPrice: 500, icon: '🍮' },
];

let products = [];
let currentFilter = 'all';

// ========== التهيئة ==========
document.addEventListener('DOMContentLoaded', function() {
    loadProducts();
    renderProducts();
    updateStats();
});

function loadProducts() {
    const saved = localStorage.getItem('control_products');
    if (saved) {
        products = JSON.parse(saved);
        // التحقق من وجود منتجات جديدة في DEFAULT_PRODUCTS
        DEFAULT_PRODUCTS.forEach(def => {
            if (!products.find(p => p.id === def.id)) {
                products.push({ ...def });
            }
        });
    } else {
        products = DEFAULT_PRODUCTS.map(p => ({ ...p }));
    }
    // فرز المنتجات حسب الفئة ثم الاسم
    products.sort((a, b) => {
        if (a.category !== b.category) return a.category.localeCompare(b.category);
        return a.name.localeCompare(b.name);
    });
}

// ========== القائمة الجانبية ==========
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const content = document.getElementById('sidebarContent');
    if (sidebar.classList.contains('hidden')) {
        sidebar.classList.remove('hidden');
        setTimeout(() => content.classList.remove('translate-x-full'), 10);
    } else {
        content.classList.add('translate-x-full');
        setTimeout(() => sidebar.classList.add('hidden'), 300);
    }
}

function logout() {
    if (confirm('هل تريد الخروج من النظام؟')) {
        showToast('تم الخروج بنجاح', 'info');
        setTimeout(() => location.href = 'login.html', 1000);
    }
}

// ========== فلترة الفئات ==========
function filterCategory(cat) {
    currentFilter = cat;
    document.querySelectorAll('[data-cat]').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.cat === cat);
    });
    renderProducts();
}

// ========== عرض المنتجات ==========
function renderProducts() {
    const container = document.getElementById('productsContainer');
    let filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);

    if (filtered.length === 0) {
        container.innerHTML = '<div class="text-center text-slate-400 py-8">لا توجد منتجات في هذه الفئة</div>';
        return;
    }

    let html = '';
    let currentCat = '';

    filtered.forEach(p => {
        if (p.category !== currentCat) {
            currentCat = p.category;
            const catNames = { bakery: '🥐 خبيز', biscuit: '🍪 بسكويت', dessert: '🍰 حلويات' };
            html += `<div class="category-header">${catNames[currentCat] || currentCat}</div>`;
        }

        const unitColors = {
            'كجم': 'bg-emerald-100 text-emerald-700',
            'صحن': 'bg-amber-100 text-amber-700',
            'حبة': 'bg-blue-100 text-blue-700'
        };

        html += `
            <div class="price-card fade-in">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-3">
                        <span class="text-2xl">${p.icon}</span>
                        <div>
                            <div class="font-bold text-slate-800">${p.name}</div>
                            <span class="unit-badge ${unitColors[p.unit] || 'bg-slate-100 text-slate-600'}">
                                ${p.unit === 'صحن' ? '🍽️' : '⚖️'} ${p.unit}
                            </span>
                        </div>
                    </div>
                    <div class="text-left">
                        <div class="text-xs text-slate-400">السعر الحالي</div>
                        <div class="font-bold text-lg text-slate-800" id="display-${p.id}">${formatNumber(p.price || p.defaultPrice)} ج</div>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <div class="flex-1">
                        <label class="text-xs text-slate-500 mb-1 block">السعر الجديد</label>
                        <input type="number" 
                               id="price-${p.id}" 
                               class="price-input" 
                               placeholder="0" 
                               value="${p.price || p.defaultPrice}"
                               min="0" 
                               step="1"
                               oninput="updatePriceDisplay('${p.id}')">
                    </div>
                    <div class="flex-1">
                        <label class="text-xs text-slate-500 mb-1 block">وحدة القياس</label>
                        <select id="unit-${p.id}" class="price-input text-sm" onchange="updateUnit('${p.id}')">
                            <option value="كجم" ${p.unit === 'كجم' ? 'selected' : ''}>⚖️ كجم</option>
                            <option value="صحن" ${p.unit === 'صحن' ? 'selected' : ''}>🍽️ صحن</option>
                            <option value="حبة" ${p.unit === 'حبة' ? 'selected' : ''}>📦 حبة</option>
                        </select>
                    </div>
                </div>
            </div>
        `;
    });

    container.innerHTML = html;
}

function updatePriceDisplay(id) {
    const input = document.getElementById('price-' + id);
    const display = document.getElementById('display-' + id);
    const val = parseFloat(input.value) || 0;
    display.textContent = formatNumber(val) + ' ج';
    display.style.color = val !== (products.find(p => p.id === id).price || products.find(p => p.id === id).defaultPrice) ? '#667eea' : '#1e293b';
}

function updateUnit(id) {
    const select = document.getElementById('unit-' + id);
    const product = products.find(p => p.id === id);
    if (product) {
        product.unit = select.value;
    }
}

// ========== حفظ الأسعار ==========
function saveAllPrices() {
    let changed = 0;
    products.forEach(p => {
        const input = document.getElementById('price-' + p.id);
        const unitSelect = document.getElementById('unit-' + p.id);
        if (input) {
            const newPrice = parseFloat(input.value) || p.defaultPrice;
            if (newPrice !== (p.price || p.defaultPrice)) {
                p.price = newPrice;
                changed++;
            }
        }
        if (unitSelect) {
            p.unit = unitSelect.value;
        }
    });

    localStorage.setItem('control_products', JSON.stringify(products));

    // تحديث الأسعار في صفحة الفواتير (تخزين في مفتاح مشترك)
    const invoicePrices = {};
    products.forEach(p => {
        invoicePrices[p.name] = {
            price: p.price || p.defaultPrice,
            unit: p.unit
        };
    });
    localStorage.setItem('product_prices', JSON.stringify(invoicePrices));

    updateStats();
    renderProducts();

    if (changed > 0) {
        showToast(`تم تحديث ${changed} سعر بنجاح`, 'success');
    } else {
        showToast('تم حفظ الإعدادات', 'success');
    }
}

function resetAllPrices() {
    if (!confirm('هل تريد إعادة جميع الأسعار للقيم الافتراضية؟')) return;

    products.forEach(p => {
        p.price = p.defaultPrice;
        p.unit = DEFAULT_PRODUCTS.find(d => d.id === p.id)?.unit || 'كجم';
    });

    localStorage.setItem('control_products', JSON.stringify(products));

    const invoicePrices = {};
    products.forEach(p => {
        invoicePrices[p.name] = {
            price: p.defaultPrice,
            unit: p.unit
        };
    });
    localStorage.setItem('product_prices', JSON.stringify(invoicePrices));

    renderProducts();
    updateStats();
    showToast('تم إعادة ضبط الأسعار', 'info');
}

// ========== إحصائيات ==========
function updateStats() {
    document.getElementById('totalProducts').textContent = products.length;
    const total = products.reduce((sum, p) => sum + (p.price || p.defaultPrice), 0);
    const avg = products.length > 0 ? Math.round(total / products.length) : 0;
    document.getElementById('avgPrice').textContent = formatNumber(avg) + ' ج';
}

// ========== إشعارات ==========
function showToast(msg, type) {
    const toast = document.getElementById('toast');
    toast.className = 'toast toast-' + type;
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3000);
}

function formatNumber(num) {
    return num.toLocaleString('en-US');
}
</script>
</body>
</html>
