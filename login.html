<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تسجيل الدخول - مدير حسابات صلاح الدين</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        * { font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .fade-in { animation: fadeIn 0.5s ease; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .btn-press:active { transform: scale(0.95); }
        
        .hidden { display: none !important; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="glass rounded-3xl shadow-2xl p-8 w-full max-w-md fade-in">
        <!-- الشعار -->
        <div class="text-center mb-8">
            <div class="text-6xl mb-4">🍰</div>
            <h1 class="text-2xl font-bold text-slate-800">مدير حسابات صلاح الدين</h1>
            <p class="text-slate-500 mt-2" id="subtitle">تسجيل الدخول إلى حسابك</p>
        </div>

        <!-- رسائل التنبيه -->
        <div id="alertBox" class="hidden rounded-xl p-4 mb-4 text-sm text-center"></div>

        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm text-slate-600 mb-1 font-semibold">البريد الإلكتروني</label>
                <input type="email" id="email" required
                    class="w-full border-2 border-slate-200 rounded-xl p-4 text-right focus:border-emerald-500 focus:outline-none transition"
                    placeholder="your@email.com">
            </div>
            
            <div>
                <label class="block text-sm text-slate-600 mb-1 font-semibold">كلمة المرور</label>
                <input type="password" id="password" required
                    class="w-full border-2 border-slate-200 rounded-xl p-4 text-right focus:border-emerald-500 focus:outline-none transition"
                    placeholder="••••••••">
            </div>

            <!-- رابط نسيت كلمة المرور -->
            <div class="text-left">
                <button type="button" onclick="showResetPassword()" class="text-sm text-emerald-600 hover:text-emerald-700 hover:underline">
                    هل نسيت كلمة المرور؟
                </button>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl p-4 font-bold text-lg btn-press shadow-lg hover:shadow-xl transition">
                تسجيل الدخول
            </button>
        </form>

        <!-- نموذج إعادة تعيين كلمة المرور -->
        <form id="resetForm" class="space-y-4 hidden">
            <div class="bg-blue-50 border border-blue-200 rounded-xl p-4 text-blue-800 text-sm mb-4">
                سيتم إرسال رابط إعادة التعيين إلى بريدك الإلكتروني
            </div>
            
            <div>
                <label class="block text-sm text-slate-600 mb-1 font-semibold">البريد الإلكتروني</label>
                <input type="email" id="resetEmail" required
                    class="w-full border-2 border-slate-200 rounded-xl p-4 text-right focus:border-blue-500 focus:outline-none transition"
                    placeholder="your@email.com">
            </div>

            <button type="submit"
                class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-xl p-4 font-bold text-lg btn-press shadow-lg hover:shadow-xl transition">
                إرسال رابط التعيين
            </button>
            
            <button type="button" onclick="showLogin()"
                class="w-full bg-slate-100 text-slate-600 rounded-xl p-4 font-semibold btn-press transition">
                العودة لتسجيل الدخول
            </button>
        </form>

        <!-- قسم التبديل -->
        <div class="mt-6 text-center border-t border-slate-200 pt-6" id="toggleSection">
            <p class="text-slate-500 text-sm mb-2">ليس لديك حساب؟</p>
            <button onclick="showRegister()" 
                class="text-emerald-600 font-bold hover:text-emerald-700 transition">
                إنشاء حساب جديد
            </button>
        </div>

        <!-- زر العودة من التسجيل -->
        <div class="mt-6 text-center hidden" id="backToLogin">
            <button onclick="showLogin()" 
                class="text-slate-500 hover:text-slate-700 transition">
                ← العودة لتسجيل الدخول
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged,
            signInWithEmailAndPassword,
            createUserWithEmailAndPassword,
            sendPasswordResetEmail,
            sendEmailVerification,
            updateProfile
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDXnCq-6YYU8QwVdOzN9d1EfyOTWzqWBvs",
            authDomain: "salahsweetmanage.firebaseapp.com",
            databaseURL: "https://salahsweetmanage-default-rtdb.firebaseio.com",
            projectId: "salahsweetmanage",
            storageBucket: "salahsweetmanage.firebasestorage.app",
            messagingSenderId: "126049780562",
            appId: "1:126049780562:web:147daa036e56273263308b",
            measurementId: "G-E7FLGBQ397"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // حالة التطبيق
        let isRegisterMode = false;

        // عناصر DOM
        const loginForm = document.getElementById('loginForm');
        const resetForm = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const subtitle = document.getElementById('subtitle');
        const toggleSection = document.getElementById('toggleSection');
        const backToLogin = document.getElementById('backToLogin');
        const alertBox = document.getElementById('alertBox');

        // التحقق من حالة المصادقة
        onAuthStateChanged(auth, (user) => {
            if (user && user.emailVerified) {
                // المستخدم مسجل وموثق، انتقل للتطبيق
                window.location.href = 'index.html';
            }
            // إذا لم يكن موثقاً، يبقى في صفحة التوثيق
        });

        // دالة إظهار التنبيه
        function showAlert(message, type = 'error') {
            alertBox.className = `rounded-xl p-4 mb-4 text-sm text-center fade-in ${
                type === 'error' ? 'bg-red-50 text-red-700 border border-red-200' :
                type === 'success' ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' :
                'bg-blue-50 text-blue-700 border border-blue-200'
            }`;
            alertBox.textContent = message;
            alertBox.classList.remove('hidden');
            
            setTimeout(() => {
                alertBox.classList.add('hidden');
            }, 5000);
        }

        // تسجيل الدخول / إنشاء حساب
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="animate-pulse">جاري المعالجة...</span>';

            try {
                if (isRegisterMode) {
                    // إنشاء حساب جديد
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    // إرسال بريد التوثيق
                    await sendEmailVerification(user);
                    
                    showAlert('✅ تم إنشاء الحساب! تم إرسال رابط التوثيق إلى بريدك. يرجى التحقق من بريدك ثم تسجيل الدخول.', 'success');
                    
                    // إعادة تعيين النموذج
                    setTimeout(() => {
                        showLogin();
                    }, 3000);
                    
                } else {
                    // تسجيل الدخول
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    if (!user.emailVerified) {
                        showAlert('⚠️ لم يتم توثيق حسابك بعد! يرجى التحقق من بريدك الإلكتروني.', 'error');
                        await sendEmailVerification(user);
                        showAlert('🔄 تم إعادة إرسال رابط التوثيق', 'success');
                        return;
                    }
                    
                    // نجاح التسجيل والتوثيق
                    window.location.href = 'index.html';
                }
                
            } catch (error) {
                console.error(error);
                showAlert(translateError(error.code), 'error');
                submitBtn.classList.add('shake');
                setTimeout(() => submitBtn.classList.remove('shake'), 500);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = isRegisterMode ? 'إنشاء الحساب' : 'تسجيل الدخول';
            }
        });

        // إعادة تعيين كلمة المرور
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('resetEmail').value;
            const btn = resetForm.querySelector('button[type="submit"]');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="animate-pulse">جاري الإرسال...</span>';

            try {
                await sendPasswordResetEmail(auth, email);
                showAlert('✅ تم إرسال رابط إعادة التعيين! يرجى التحقق من بريدك.', 'success');
                setTimeout(() => showLogin(), 3000);
            } catch (error) {
                showAlert(translateError(error.code), 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'إرسال رابط التعيين';
            }
        });

        // ترجمة الأخطاء
        function translateError(code) {
            const errors = {
                'auth/invalid-email': '❌ البريد الإلكتروني غير صالح',
                'auth/user-disabled': '❌ تم تعطيل هذا الحساب',
                'auth/user-not-found': '❌ لم يتم العثور على حساب بهذا البريد',
                'auth/wrong-password': '❌ كلمة المرور غير صحيحة',
                'auth/email-already-in-use': '❌ هذا البريد مستخدم بالفعل',
                'auth/weak-password': '❌ كلمة المرور ضعيفة (6 أحرف على الأقل)',
                'auth/invalid-credential': '❌ البريد أو كلمة المرور غير صحيحة',
                'auth/too-many-requests': '❌ محاولات كثيرة، يرجى المحاولة لاحقاً',
                'auth/network-request-failed': '❌ مشكلة في الاتصال، تأكد من الإنترنت',
                'auth/requires-recent-login': '❌ يلزم إعادة تسجيل الدخول لأمان إضافي'
            };
            return errors[code] || '❌ حدث خطأ غير متوقع، يرجى المحاولة مرة أخرى';
        }

        // دوال التنقل بين الأوضاع
        window.showLogin = () => {
            isRegisterMode = false;
            loginForm.classList.remove('hidden');
            resetForm.classList.add('hidden');
            subtitle.textContent = 'تسجيل الدخول إلى حسابك';
            submitBtn.textContent = 'تسجيل الدخول';
            submitBtn.className = 'w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl p-4 font-bold text-lg btn-press shadow-lg hover:shadow-xl transition';
            toggleSection.classList.remove('hidden');
            backToLogin.classList.add('hidden');
            alertBox.classList.add('hidden');
            loginForm.reset();
        };

        window.showRegister = () => {
            isRegisterMode = true;
            loginForm.classList.remove('hidden');
            resetForm.classList.add('hidden');
            subtitle.textContent = 'إنشاء حساب جديد';
            submitBtn.textContent = 'إنشاء الحساب';
            submitBtn.className = 'w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-xl p-4 font-bold text-lg btn-press shadow-lg hover:shadow-xl transition';
            toggleSection.classList.add('hidden');
            backToLogin.classList.remove('hidden');
            alertBox.classList.add('hidden');
        };

        window.showResetPassword = () => {
            loginForm.classList.add('hidden');
            resetForm.classList.remove('hidden');
            subtitle.textContent = 'إعادة تعيين كلمة المرور';
            toggleSection.classList.add('hidden');
            backToLogin.classList.remove('hidden');
            alertBox.classList.add('hidden');
        };

        // جعل الدوال متاحة عالمياً
        window.showLogin = showLogin;
        window.showRegister = showRegister;
        window.showResetPassword = showResetPassword;
    </script>
</body>
</html>
