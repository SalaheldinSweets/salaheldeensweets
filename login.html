<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مدير حسابات صلاح الدين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .shake { animation: shake 0.5s ease-in-out; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-up { animation: slideUp 0.4s ease-out; }
        
        .input-group:focus-within label {
            color: #10b981;
        }
        
        .input-group:focus-within input {
            border-color: #10b981;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
        }
        
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .fade-in { animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <!-- البطاقة الرئيسية -->
    <div class="glass-card rounded-3xl p-8 w-full max-w-md slide-up">
        
        <!-- الشعار -->
        <div class="text-center mb-8">
            <div class="w-20 h-20 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-emerald-500/30">
                <span class="text-4xl">💰</span>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">مدير حسابات صلاح الدين</h1>
            <p class="text-slate-500 text-sm mt-1">نظام إدارة مالي متكامل</p>
        </div>
        
        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" class="space-y-5">
            
            <!-- حقل البريد -->
            <div class="input-group">
                <label class="block text-sm font-semibold text-slate-700 mb-2 transition-colors">
                    البريد الإلكتروني
                </label>
                <div class="relative">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">📧</span>
                    <input 
                        type="email" 
                        id="email" 
                        class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl pr-12 pl-4 py-3.5 text-right transition-all outline-none"
                        placeholder="أدخل بريدك الإلكتروني"
                        autocomplete="email"
                        required
                    >
                </div>
            </div>
            
            <!-- حقل كلمة المرور -->
            <div class="input-group">
                <label class="block text-sm font-semibold text-slate-700 mb-2 transition-colors">
                    كلمة المرور
                </label>
                <div class="relative">
                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">🔒</span>
                    <input 
                        type="password" 
                        id="password" 
                        class="w-full bg-slate-50 border-2 border-slate-200 rounded-xl pr-12 pl-12 py-3.5 text-right transition-all outline-none"
                        placeholder="أدخل كلمة المرور"
                        autocomplete="current-password"
                        required
                    >
                    <button 
                        type="button" 
                        onclick="togglePassword()"
                        class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition"
                    >
                        <span id="eyeIcon">👁️</span>
                    </button>
                </div>
            </div>
            
            <!-- نسيت كلمة المرور -->
            <div class="flex justify-start">
                <button 
                    type="button" 
                    onclick="showForgotPassword()"
                    class="text-sm text-emerald-600 hover:text-emerald-700 font-medium transition hover:underline"
                >
                    هل نسيت كلمة المرور؟
                </button>
            </div>
            
            <!-- زر الدخول -->
            <button 
                type="submit" 
                id="loginBtn"
                class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white rounded-xl py-4 font-bold text-lg shadow-lg shadow-emerald-500/30 transition-all transform hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-2"
            >
                <span id="btnText">تسجيل الدخول</span>
            </button>
            
        </form>
        
        <!-- رسالة الخطأ -->
        <div id="errorMsg" class="hidden mt-4 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm text-center shake">
            <span class="font-bold block mb-1">⚠️ خطأ في تسجيل الدخول</span>
            <span id="errorText"></span>
        </div>
        
        <!-- رسالة النجاح -->
        <div id="successMsg" class="hidden mt-4 p-4 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-700 text-sm text-center fade-in">
            <span class="font-bold block mb-1">✓ تم التحقق بنجاح</span>
            <span>جاري الدخول إلى النظام...</span>
        </div>
        
        <!-- مودال نسيت كلمة المرور -->
        <div id="forgotModal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 fade-in">
            <div class="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl">
                <div class="text-center mb-4">
                    <div class="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-3">
                        <span class="text-3xl">🔑</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800">استعادة كلمة المرور</h3>
                </div>
                
                <p class="text-slate-600 text-sm text-center mb-4">
                    أدخل بريدك الإلكتروني وسنرسل لك رابط استعادة كلمة المرور
                </p>
                
                <input 
                    type="email" 
                    id="resetEmail" 
                    class="w-full border-2 border-slate-200 rounded-xl p-3 text-right mb-4 focus:border-amber-500 focus:outline-none"
                    placeholder="بريدك الإلكتروني"
                >
                
                <div class="flex gap-2">
                    <button 
                        onclick="hideForgotPassword()"
                        class="flex-1 py-3 rounded-xl border-2 border-slate-200 text-slate-600 font-semibold hover:bg-slate-50 transition"
                    >
                        إلغاء
                    </button>
                    <button 
                        onclick="sendResetLink()"
                        class="flex-1 py-3 rounded-xl bg-amber-500 text-white font-semibold hover:bg-amber-600 transition"
                    >
                        إرسال
                    </button>
                </div>
            </div>
        </div>
        
    </div>

    <script type="module">
        // ========== Firebase ==========
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            signInWithEmailAndPassword,
            sendPasswordResetEmail,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDXnCq-6YYU8QwVdOzN9d1EfyOTWzqWBvs",
            authDomain: "salahsweetmanage.firebaseapp.com",
            projectId: "salahsweetmanage",
            storageBucket: "salahsweetmanage.firebasestorage.app",
            messagingSenderId: "126049780562",
            appId: "1:126049780562:web:147daa036e56273263308b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // التحقق إذا كان مسجل مسبقاً
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.replace('index.html');
            }
        });

        // ========== تسجيل الدخول ==========
        
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const successMsg = document.getElementById('successMsg');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            // إخفاء الرسائل
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');
            
            // تحميل
            loginBtn.disabled = true;
            btnText.innerHTML = '<span class="spinner"></span> جاري التحقق...';
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                
                // نجاح
                successMsg.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.replace('index.html');
                }, 1500);
                
            } catch (error) {
                // فشل
                loginBtn.disabled = false;
                btnText.textContent = 'تسجيل الدخول';
                
                let message = 'البريد الإلكتروني أو كلمة المرور غير صحيحة';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        message = 'لا يوجد حساب بهذا البريد الإلكتروني';
                        break;
                    case 'auth/wrong-password':
                        message = 'كلمة المرور غير صحيحة';
                        break;
                    case 'auth/invalid-email':
                        message = 'البريد الإلكتروني غير صالح';
                        break;
                    case 'auth/user-disabled':
                        message = 'تم تعطيل هذا الحساب';
                        break;
                    case 'auth/too-many-requests':
                        message = 'تم حظر المحاولات مؤقتاً، حاول لاحقاً';
                        break;
                }
                
                errorText.textContent = message;
                errorMsg.classList.remove('hidden');
            }
        });

        // ========== نسيت كلمة المرور ==========
        
        window.showForgotPassword = () => {
            document.getElementById('forgotModal').classList.remove('hidden');
            document.getElementById('resetEmail').value = document.getElementById('email').value;
        };

        window.hideForgotPassword = () => {
            document.getElementById('forgotModal').classList.add('hidden');
        };

        window.sendResetLink = async () => {
            const email = document.getElementById('resetEmail').value.trim();
            
            if (!email) {
                alert('الرجاء إدخال البريد الإلكتروني');
                return;
            }
            
            try {
                await sendPasswordResetEmail(auth, email);
                alert('✓ تم إرسال رابط استعادة كلمة المرور إلى بريدك');
                hideForgotPassword();
            } catch (error) {
                let message = 'حدث خطأ، حاول مرة أخرى';
                
                switch(error.code) {
                    case 'auth/user-not-found':
                        message = 'لا يوجد حساب بهذا البريد';
                        break;
                    case 'auth/invalid-email':
                        message = 'البريد الإلكتروني غير صالح';
                        break;
                }
                
                alert('❌ ' + message);
            }
        };

        // إغلاق المودال بالخارج
        document.getElementById('forgotModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                hideForgotPassword();
            }
        });
    </script>

    <script>
        // ========== وظائف مساعدة ==========
        
        // إظهار/إخفاء كلمة المرور
        window.togglePassword = () => {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                eyeIcon.textContent = '👁️';
            }
        };
    </script>

</body>
</html>
