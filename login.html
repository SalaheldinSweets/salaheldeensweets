<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مدير حسابات صلاح الدين</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .shake { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    
    <div class="glass-card rounded-3xl p-8 w-full max-w-md shadow-2xl">
        <!-- Logo -->
        <div class="w-24 h-24 bg-gradient-to-br from-emerald-400 to-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-lg">
            <span class="text-5xl">💰</span>
        </div>
        
        <h1 class="text-2xl font-bold text-slate-800 mb-2 text-center">مدير حسابات صلاح الدين</h1>
        <p class="text-slate-500 text-sm mb-8 text-center">نظام إدارة مالي متكامل</p>
        
        <!-- نموذج تسجيل الدخول -->
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm text-slate-600 mb-1 font-semibold">البريد الإلكتروني</label>
                <input type="email" id="email" 
                    class="w-full border-2 border-slate-200 rounded-xl p-3 text-right focus:border-emerald-500 focus:outline-none transition"
                    placeholder="nohesapnooo@gmail.com" required>
            </div>
            
            <div>
                <label class="block text-sm text-slate-600 mb-1 font-semibold">كلمة المرور</label>
                <input type="password" id="password" 
                    class="w-full border-2 border-slate-200 rounded-xl p-3 text-right focus:border-emerald-500 focus:outline-none transition"
                    placeholder="••••••••" required>
            </div>
            
            <button type="submit" id="loginBtn"
                class="w-full bg-gradient-to-r from-emerald-500 to-emerald-600 text-white rounded-xl p-4 font-bold text-lg shadow-lg hover:shadow-xl transition transform hover:scale-[1.02]">
                تسجيل الدخول
            </button>
        </form>
        
        <!-- رسالة خطأ -->
        <div id="errorMsg" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm text-center shake"></div>
        
        <!-- رسالة نجاح -->
        <div id="successMsg" class="hidden mt-4 p-3 bg-emerald-50 border border-emerald-200 rounded-xl text-emerald-600 text-sm text-center">
            ✓ تم تسجيل الدخول، جاري التحويل...
        </div>
        
        <!-- معلومات -->
        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-xs text-slate-400">
                الحساب الافتراضي:
                <span class="font-mono text-emerald-600 font-bold block mt-1">nohesapnooo@gmail.com</span>
                <span class="font-mono text-slate-500">123456</span>
            </p>
        </div>
    </div>

    <script>
        // بيانات تسجيل الدخول (ثابتة - يمكنك تغييرها)
        const VALID_EMAIL = 'nohesapnooo@gmail.com';
        const VALID_PASSWORD = '123456';
        
        // التحقق إذا كان مسجل مسبقاً
        if (localStorage.getItem('isLoggedIn') === 'true') {
            window.location.replace('index.html');
        }
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const successDiv = document.getElementById('successMsg');
            const btn = document.getElementById('loginBtn');
            
            // إخفاء الرسائل السابقة
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            // التحقق من البيانات
            if (email === VALID_EMAIL && password === VALID_PASSWORD) {
                // نجاح
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', email);
                
                successDiv.classList.remove('hidden');
                btn.disabled = true;
                btn.textContent = 'جاري الدخول...';
                
                setTimeout(() => {
                    window.location.replace('index.html');
                }, 1000);
                
            } else {
                // فشل
                errorDiv.textContent = '❌ البريد الإلكتروني أو كلمة المرور غير صحيحة';
                errorDiv.classList.remove('hidden');
                
                // إفراغ كلمة المرور
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        });
    </script>
</body>
</html>
