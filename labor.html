<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العمالة | مصنع صلاح الدين</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-navy: #1e293b;
            --accent-blue: #3b82f6;
            --danger: #ef4444;
            --bg-canvas: #f8fafc;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-canvas);
            margin: 0;
            padding: 20px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .back-link { text-decoration: none; color: var(--primary-navy); font-weight: 700; }

        /* نموذج تسجيل العامل */
        .worker-form {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        .input-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .field-group { display: flex; flex-direction: column; gap: 8px; }

        input, select {
            padding: 12px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Cairo';
            font-size: 15px;
        }

        .btn-submit {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 800;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn-submit:hover { background: #2563eb; }

        /* جدول العمال */
        .worker-table-container {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: var(--primary-navy); color: white; padding: 15px; text-align: right; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; }

        .role-tag {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .role-mixing { background: #fef3c7; color: #92400e; } /* عجان */
        .role-cleaning { background: #dcfce7; color: #166534; } /* غسيل */
        .role-sales { background: #e0f2fe; color: #075985; } /* مبيعات */

        .total-box {
            margin-top: 20px;
            background: var(--primary-navy);
            color: white;
            padding: 15px 25px;
            border-radius: 15px;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <a href="index.html" class="back-link">🔙 العودة للرئيسية</a>
        <h2>إدارة طاقم العمل والتشغيل 👥</h2>
    </div>

    <div class="worker-form">
        <div class="input-row">
            <div class="field-group">
                <label>اسم العامل</label>
                <input type="text" id="workerName" placeholder="مثال: محمد علي">
            </div>
            <div class="field-group">
                <label>الوظيفة / القسم</label>
                <select id="workerRole">
                    <option value="mixing">عجان (تحضير العجين)</option>
                    <option value="cleaning">نظافة وغسيل أدوات</option>
                    <option value="sales">بائع (محل/خارجي)</option>
                </select>
            </div>
            <div class="field-group">
                <label>الأجر اليومي (ج.م)</label>
                <input type="number" id="dailyWage" placeholder="0.00">
            </div>
        </div>
        <button class="btn-submit" onclick="addWorker()">تسجيل حضور وأجر +</button>
    </div>

    <div class="worker-table-container">
        <table id="laborTable">
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>المهمة</th>
                    <th>الأجر</th>
                    <th>تاريخ التسجيل</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <div class="total-box">
        إجمالي أجور التشغيل لليوم: <span id="totalLaborPrice">0</span> ج.م
    </div>
</div>

<script>
    let totalExpenses = 0;

    function addWorker() {
        const name = document.getElementById('workerName').value;
        const roleSelect = document.getElementById('workerRole');
        const roleText = roleSelect.options[roleSelect.selectedIndex].text;
        const roleValue = roleSelect.value;
        const wage = parseFloat(document.getElementById('dailyWage').value);
        const date = new Date().toLocaleDateString('ar-EG');

        if(name && wage) {
            const table = document.getElementById('laborTable').getElementsByTagName('tbody')[0];
            const row = table.insertRow();
            
            // تحديد كلاس اللون بناء على الوظيفة
            let roleClass = 'role-mixing';
            if(roleValue === 'cleaning') roleClass = 'role-cleaning';
            if(roleValue === 'sales') roleClass = 'role-sales';

            row.innerHTML = `
                <td><strong>${name}</strong></td>
                <td><span class="role-tag ${roleClass}">${roleText}</span></td>
                <td>${wage} ج.م</td>
                <td>${date}</td>
            `;

            // تحديث الإجمالي
            totalExpenses += wage;
            document.getElementById('totalLaborPrice').innerText = totalExpenses;

            // مسح الحقول
            document.getElementById('workerName').value = "";
            document.getElementById('dailyWage').value = "";
        } else {
            alert("يرجى إدخال اسم العامل والأجر المستحق.");
        }
    }
</script>

</body>
</html>
